name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev,demo]"
      - run: python -m pip install pip-audit==2.10.0
      - name: Capture dependency findings for VEX review
        run: pip-audit --require-hashes --disable-pip -r requirements.lock --format json --output build/pip-audit.json || test "$?" -eq 1
      - run: decision-agent-bench audit-release --dependency-report build/pip-audit.json --output build/release-audit.json

  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pypa/gh-action-pip-audit@v1.1.0
        with:
          inputs: requirements.lock
          require-hashes: true
          disable-pip: true
          ignore-vulns: CVE-2026-7246

  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: docker build --tag decision-agent-bench:ci .
      - run: docker run --rm decision-agent-bench:ci
      - run: docker run --rm --entrypoint sh decision-agent-bench:ci -c 'test "$(id -u)" = "10001"'

  secret-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: "false"
          GITLEAKS_VERSION: "8.30.1"

  codeql:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      security-events: write
    steps:
      - uses: actions/checkout@v7
      - uses: github/codeql-action/init@v4
        with:
          languages: python
          build-mode: none
      - uses: github/codeql-action/analyze@v4
